<dl class="tv-brew-card tv-metric-row" aria-label="Parametri di preparazione">
  <div class="tv-brew-card__row">
    <dt class="tv-brew-card__label">Temperatura</dt>
    <dd class="tv-brew-card__value"><span class="tv-brew-card__number">{{ body.temp }}</span>°C</dd>
  </div>
  <div class="tv-brew-card__row">
    <dt class="tv-brew-card__label">Dosaggio</dt>
    <dd class="tv-brew-card__value"><span class="tv-brew-card__number">{{ body.grams }}</span> g / 100 ml</dd>
  </div>
  <div class="tv-brew-card__row">
    <dt class="tv-brew-card__label">Prima infusione</dt>
    <dd class="tv-brew-card__value"><span class="tv-brew-card__number">{{ body.seconds }}</span> sec</dd>
  </div>
  <div class="tv-brew-card__row">
    <dt class="tv-brew-card__label">Infusioni</dt>
    <dd class="tv-brew-card__value">{{ body.infusions }}</dd>
  </div>
</dl>
