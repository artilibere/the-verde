{# Early prefetch for predictable next pages (path nav + explore_next). #}
{% if meta is defined %}
{% if meta.path_nav is defined and meta.path_nav.next %}
<link rel="prefetch" href="{{ meta.path_nav.next.url }}" as="document">
{% endif %}
{% if meta.explore_next %}
{% for link in meta.explore_next[:2] %}
<link rel="prefetch" href="{{ link.url }}" as="document">
{% endfor %}
{% endif %}
{% endif %}
